<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome to Pharmacy App</title>
</head>
<body style="margin:0;padding:0;background:#f4f7fb;font-family:Arial,sans-serif;color:#1f2937;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f7fb;padding:24px 0;">
    <tr>
        <td align="center">
            <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="background:#ffffff;border-radius:12px;overflow:hidden;">
                <tr>
                    <td style="background:#1d4ed8;padding:24px 32px;color:#ffffff;">
                        <h1 style="margin:0;font-size:28px;">Welcome to Pharmacy App</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding:32px;">
                        <p style="font-size:18px;margin:0 0 16px;">Hi <strong th:text="${name}">User</strong>,</p>
                        <p style="font-size:16px;line-height:1.6;margin:0 0 16px;">
                            Your account has been created successfully. We are excited to have you with us.
                        </p>
                        <p style="font-size:16px;line-height:1.6;margin:0 0 28px;">
                            Please verify your email address to complete your account setup.
                        </p>
                        <a th:href="${verifyUrl}"
                           style="display:inline-block;background:#16a34a;color:#ffffff;text-decoration:none;padding:14px 24px;border-radius:8px;font-weight:bold;">
                            Verify Email
                        </a>
                        <p style="font-size:14px;line-height:1.6;color:#6b7280;margin:28px 0 0;">
                            If the button does not work, copy and open this link:<br>
                            <span th:text="${verifyUrl}">http://localhost:3000/verify-email</span>
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
